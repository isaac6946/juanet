<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juanet — Create account</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="center-screen" style="justify-content:flex-start;padding-top:48px;">
  <span class="eyebrow">Get started</span>
  <h1 class="page-title">Create your account</h1>
  <p class="page-sub">Set up access to your Juanet device, services, and account tools.</p>

  <div id="msg" class="msg"></div>

  <form id="regForm">
    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" required autocomplete="name" placeholder="Jane Wanjiru">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" required autocomplete="tel" placeholder="+254 7XX XXX XXX">
    </div>
    <div class="field">
      <label for="nationality">Nationality</label>
      <select id="nationality" required>
        <option value="" disabled selected>Select nationality</option>
        <option>Kenyan</option><option>Ugandan</option><option>Tanzanian</option>
        <option>Rwandan</option><option>Ethiopian</option><option>Nigerian</option>
        <option>Ghanaian</option><option>South African</option><option>Other African</option>
        <option>Foreign — Other</option>
      </select>
    </div>
    <div class="field">
      <label for="language">Preferred language</label>
      <select id="language" required>
        <option value="" disabled selected>Select language</option>
        <option>English</option><option>Kiswahili</option><option>French</option>
        <option>Amharic</option><option>Luganda</option><option>Hausa</option>
        <option>Portuguese</option><option>Arabic</option><option>Other</option>
      </select>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters">
    </div>
    <button type="submit" class="btn btn-power" id="regBtn">Create account</button>
  </form>

  <p class="link-row">Already have an account? <a href="index.html">Log in</a></p>
</div>

<script src="https://api.backendless.com/sdk/js/latest/backendless.min.js"></script>
<script src="js/juanet.js"></script>
<script>
const form = document.getElementById('regForm');
const msg = document.getElementById('msg');
const btn = document.getElementById('regBtn');

form.addEventListener('submit', function(e){
  e.preventDefault();
  hideMsg(msg);
  setBtnLoading(btn, true, 'Creating account…', 'Create account');

  const user = new Backendless.User();
  user.name = document.getElementById('name').value.trim();
  user.email = document.getElementById('email').value.trim();
  user.password = document.getElementById('password').value;
  user.phone = document.getElementById('phone').value.trim();
  user.nationality = document.getElementById('nationality').value;
  user.language = document.getElementById('language').value;

  Backendless.UserService.register(user)
    .then(() => {
      showMsg(msg, 'Account created. Check your email for a verification link before logging in.', 'ok');
      setTimeout(() => { window.location.href = 'index.html'; }, 2200);
    })
    .catch(err => {
      showMsg(msg, err.message || 'Could not create your account. Please try again.', 'error');
      setBtnLoading(btn, false, '', 'Create account');
    });
});
</script>
</body>
</html>
