<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juanet — Maintenance</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand"><div class="charge-bars active"><span></span><span></span><span></span><span></span></div>Juanet</div>
  </div>

  <div class="app-main">
    <span class="eyebrow">Device health</span>
    <h1 class="page-title">Maintenance</h1>
    <p class="page-sub">Track your device's output, internet usage, and upcoming top-ups.</p>

    <div id="msg" class="msg"></div>

    <div class="card">
      <div class="list-item" style="border:none;padding-top:0;">
        <div class="list-title">Device output</div>
        <div class="list-sub" id="outWatts">— W</div>
      </div>
      <div class="meter"><span id="outMeter" style="width:0%"></span></div>
    </div>

    <div class="card">
      <div class="list-item" style="border:none;padding-top:0;">
        <div class="list-title">Internet usage this cycle</div>
        <div class="list-sub" id="usageMB">— MB</div>
      </div>
      <div class="meter"><span id="usageMeter" style="width:0%"></span></div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 6px;">Next top-up</h3>
      <p style="color:var(--text-muted);font-size:14px;margin:0;" id="nextTopup">Loading…</p>
    </div>

    <div class="card">
      <h3 style="margin:0 0 4px;">Status</h3>
      <p style="color:var(--text-muted);font-size:14px;margin:0;" id="deviceStatus">Loading…</p>
    </div>
  </div>

  <nav class="tabbar">
    <a href="home.html"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a href="catalog.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>Catalog</a>
    <a href="services.html"><svg viewBox="0 0 24 24"><path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15.5a6 6 0 0 1 7 0"/><circle cx="12" cy="19" r="1"/></svg>Services</a>
    <a href="maintenance.html" class="active"><svg viewBox="0 0 24 24"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>Maintain</a>
    <a href="jobs.html"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Jobs</a>
  </nav>

</div>

<script src="https://api.backendless.com/sdk/js/latest/backendless.min.js"></script>
<script src="js/juanet.js"></script>
<script>
juanetRequireAuth();
const cached = Backendless.LocalCache.get('current-user');
const msg = document.getElementById('msg');

const q = Backendless.DataQueryBuilder.create().setWhereClause("ownerId = '"+cached.objectId+"'").setPageSize(1);
Backendless.Data.of(TABLES.DEVICES).find(q)
  .then(rows => {
    if(!rows || !rows.length){
      document.getElementById('outWatts').textContent = 'No device linked yet';
      document.getElementById('usageMB').textContent = '—';
      document.getElementById('nextTopup').textContent = 'Recharge a package to get started.';
      document.getElementById('deviceStatus').textContent = 'No active device found on your account.';
      return;
    }
    const d = rows[0];
    const maxWatts = d.ratedWatts || 500;
    const pctOut = Math.min(100, Math.round(((d.outputWatts||0)/maxWatts)*100));
    document.getElementById('outWatts').textContent = (d.outputWatts ?? 0) + ' W of ' + maxWatts + ' W rated';
    document.getElementById('outMeter').style.width = pctOut + '%';

    const cap = d.dataCapMB || 20000;
    const pctUse = Math.min(100, Math.round(((d.internetUsageMB||0)/cap)*100));
    document.getElementById('usageMB').textContent = (d.internetUsageMB ?? 0) + ' MB of ' + cap + ' MB';
    document.getElementById('usageMeter').style.width = pctUse + '%';

    document.getElementById('nextTopup').textContent = d.nextTopUpDate
      ? 'Scheduled for ' + new Date(d.nextTopUpDate).toLocaleDateString()
      : 'No top-up scheduled yet.';
    document.getElementById('deviceStatus').textContent = d.status || 'Operating normally.';
  })
  .catch(err => showMsg(msg, 'Could not load device data: ' + (err.message || 'unknown error'), 'error'));
</script>
</body>
</html>
