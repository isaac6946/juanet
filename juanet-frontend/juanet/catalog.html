<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juanet — Product Catalog</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand"><div class="charge-bars active"><span></span><span></span><span></span><span></span></div>Juanet</div>
  </div>

  <div class="app-main">
    <span class="eyebrow">Manufactured units</span>
    <h1 class="page-title">Product Catalog</h1>
    <p class="page-sub">Filter by power output or unit size to find the right fit.</p>

    <div id="powerFilters" style="margin-bottom:6px;">
      <span class="chip active" data-power="all">All power</span>
      <span class="chip" data-power="low">Low (&lt;100W)</span>
      <span class="chip" data-power="mid">Mid (100–500W)</span>
      <span class="chip" data-power="high">High (&gt;500W)</span>
    </div>
    <div id="sizeFilters" style="margin-bottom:16px;">
      <span class="chip active" data-size="all">All sizes</span>
      <span class="chip" data-size="compact">Compact</span>
      <span class="chip" data-size="standard">Standard</span>
      <span class="chip" data-size="large">Large</span>
    </div>

    <div id="msg" class="msg"></div>
    <div id="list"></div>
  </div>

  <nav class="tabbar">
    <a href="home.html"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a href="catalog.html" class="active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>Catalog</a>
    <a href="services.html"><svg viewBox="0 0 24 24"><path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15.5a6 6 0 0 1 7 0"/><circle cx="12" cy="19" r="1"/></svg>Services</a>
    <a href="maintenance.html"><svg viewBox="0 0 24 24"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>Maintain</a>
    <a href="jobs.html"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Jobs</a>
  </nav>

</div>

<script src="https://api.backendless.com/sdk/js/latest/backendless.min.js"></script>
<script src="js/juanet.js"></script>
<script>
juanetRequireAuth();

let activePower = 'all', activeSize = 'all', allProducts = [];
const list = document.getElementById('list');
const msg = document.getElementById('msg');

document.querySelectorAll('#powerFilters .chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('#powerFilters .chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active'); activePower = c.dataset.power; render();
}));
document.querySelectorAll('#sizeFilters .chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('#sizeFilters .chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active'); activeSize = c.dataset.size; render();
}));

function powerBand(w){
  if(w == null) return 'mid';
  if(w < 100) return 'low';
  if(w <= 500) return 'mid';
  return 'high';
}

function render(){
  const filtered = allProducts.filter(p => {
    const okPower = activePower === 'all' || powerBand(p.powerOutput) === activePower;
    const okSize = activeSize === 'all' || (p.size || '').toLowerCase() === activeSize;
    return okPower && okSize;
  });
  if(!filtered.length){
    list.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">No units match those filters yet.</p>';
    return;
  }
  list.innerHTML = filtered.map(p => `
    <div class="unit-card">
      <div class="unit-icon"><svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg></div>
      <div>
        <div class="unit-name">${p.name || 'Unnamed unit'}</div>
        <div class="unit-meta">${p.powerOutput ?? '—'}W · ${p.size ?? '—'} · ${p.category ?? ''}</div>
      </div>
    </div>
  `).join('');
}

Backendless.Data.of(TABLES.PRODUCTS).find()
  .then(rows => { allProducts = rows || []; render(); })
  .catch(err => showMsg(msg, 'Could not load the catalog: ' + (err.message || 'unknown error'), 'error'));
</script>
</body>
</html>
