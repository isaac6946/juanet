<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juanet — Job Seekers Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand"><div class="charge-bars active"><span></span><span></span><span></span><span></span></div>Juanet</div>
  </div>

  <div class="app-main">
    <span class="eyebrow">Careers</span>
    <h1 class="page-title">Job Seekers Portal</h1>
    <p class="page-sub">Browse open roles across categories, or apply as a technician.</p>

    <a href="technician.html" class="unit-card" style="border-color:var(--signal);">
      <div class="unit-icon"><svg viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 1 1-5.4 5.4L3 18v3h3l6.3-6.3"/><path d="M15 4l5 5"/></svg></div>
      <div><div class="unit-name">Join as a technician</div><div class="unit-meta">Submit your experience &amp; portfolio</div></div>
    </a>

    <div class="divider-bars"><span></span><span></span><span></span><span></span><span></span><span></span></div>

    <div id="catFilters" style="margin-bottom:16px;">
      <span class="chip active" data-cat="all">All categories</span>
      <span class="chip" data-cat="technical">Technical</span>
      <span class="chip" data-cat="sales">Sales &amp; Field</span>
      <span class="chip" data-cat="support">Customer Support</span>
      <span class="chip" data-cat="operations">Operations</span>
    </div>

    <div id="msg" class="msg"></div>
    <div id="jobList"></div>
  </div>

  <nav class="tabbar">
    <a href="home.html"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Home</a>
    <a href="catalog.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>Catalog</a>
    <a href="services.html"><svg viewBox="0 0 24 24"><path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12a11 11 0 0 1 14 0"/><path d="M8.5 15.5a6 6 0 0 1 7 0"/><circle cx="12" cy="19" r="1"/></svg>Services</a>
    <a href="maintenance.html"><svg viewBox="0 0 24 24"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>Maintain</a>
    <a href="jobs.html" class="active"><svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Jobs</a>
  </nav>

</div>

<!-- Apply modal (simple inline panel) -->
<div id="applyPanel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:30;">
  <div style="max-width:480px;margin:auto;background:var(--surface);border-radius:16px 16px 0 0;position:absolute;bottom:0;left:0;right:0;padding:20px;">
    <h3 id="applyTitle" style="margin:0 0 14px;">Apply</h3>
    <form id="applyForm">
      <div class="field"><label>Full name</label><input type="text" id="appName" required></div>
      <div class="field"><label>Email</label><input type="email" id="appEmail" required></div>
      <div class="field"><label>Phone</label><input type="tel" id="appPhone" required></div>
      <div class="field"><label>Cover note</label><textarea id="appNote" rows="3"></textarea></div>
      <button type="submit" class="btn btn-power">Submit application</button>
      <button type="button" class="btn btn-outline" id="closePanel" style="margin-top:10px;">Cancel</button>
    </form>
  </div>
</div>

<script src="https://api.backendless.com/sdk/js/latest/backendless.min.js"></script>
<script src="js/juanet.js"></script>
<script>
juanetRequireAuth();
const cached = Backendless.LocalCache.get('current-user');
let activeCat = 'all', allJobs = [], selectedJob = null;
const jobList = document.getElementById('jobList');
const msg = document.getElementById('msg');

document.querySelectorAll('#catFilters .chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('#catFilters .chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active'); activeCat = c.dataset.cat; render();
}));

function render(){
  const filtered = activeCat === 'all' ? allJobs : allJobs.filter(j => (j.category||'').toLowerCase() === activeCat);
  if(!filtered.length){
    jobList.innerHTML = '<p style="color:var(--text-muted);font-size:14px;">No openings in this category right now.</p>';
    return;
  }
  jobList.innerHTML = filtered.map(j => `
    <div class="card">
      <div class="list-title">${j.title || 'Untitled role'}</div>
      <div class="list-sub" style="margin-bottom:10px;">${j.category ?? ''} · ${j.location ?? ''}</div>
      <p style="font-size:13.5px;color:var(--text-muted);margin:0 0 12px;">${j.description ?? ''}</p>
      <button class="btn btn-outline apply-btn" data-id="${j.objectId}" data-title="${(j.title||'').replace(/"/g,'&quot;')}">Apply</button>
    </div>
  `).join('');
  document.querySelectorAll('.apply-btn').forEach(b => b.addEventListener('click', () => openApply(b.dataset.id, b.dataset.title)));
}

function openApply(id, title){
  selectedJob = id;
  document.getElementById('applyTitle').textContent = 'Apply — ' + title;
  document.getElementById('appName').value = cached?.name || '';
  document.getElementById('appEmail').value = cached?.email || '';
  document.getElementById('applyPanel').style.display = 'block';
}
document.getElementById('closePanel').addEventListener('click', () => document.getElementById('applyPanel').style.display = 'none');

document.getElementById('applyForm').addEventListener('submit', function(e){
  e.preventDefault();
  const record = {
    jobObjectId: selectedJob,
    applicantName: document.getElementById('appName').value.trim(),
    applicantEmail: document.getElementById('appEmail').value.trim(),
    phone: document.getElementById('appPhone').value.trim(),
    coverNote: document.getElementById('appNote').value.trim()
  };
  Backendless.Data.of(TABLES.JOB_APPLICATIONS).save(record)
    .then(() => {
      document.getElementById('applyPanel').style.display = 'none';
      showMsg(msg, 'Application submitted. We\'ll be in touch.', 'ok');
    })
    .catch(err => showMsg(msg, err.message || 'Could not submit application.', 'error'));
});

Backendless.Data.of(TABLES.JOBS).find()
  .then(rows => { allJobs = rows || []; render(); })
  .catch(err => showMsg(msg, 'Could not load job listings: ' + (err.message || 'unknown error'), 'error'));
</script>
</body>
</html>
